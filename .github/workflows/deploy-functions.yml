name: Deploy Firebase Functions (manual)
on:
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Functions Entry
        run: node --check functions/index.js

      - name: Prepare Firebase credentials
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BEELIBER_MAIN }}
          EOF

      - name: Deploy Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --project beeliber-main --only functions --non-interactive
