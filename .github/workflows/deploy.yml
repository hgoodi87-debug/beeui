name: Deploy Firebase Hosting and Rules on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Supabase Environment
        run: node scripts/validate-env.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Build script also generates prerendered route HTML and __spa-fallback.html
      - name: Build
        run: npm run build:seo
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ADMIN_AUTH_PROVIDER: ${{ vars.VITE_ADMIN_AUTH_PROVIDER }}
          VITE_TOSS_PAYMENTS_ENABLED: 'false'
          VITE_TOSS_PAYMENTS_MOCK_MODE: 'false'

      - name: Prepare Firebase credentials
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BEELIBER_MAIN }}
          EOF

      - name: Deploy to Firebase Hosting and Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --project beeliber-main --only hosting,firestore:rules,storage --non-interactive
