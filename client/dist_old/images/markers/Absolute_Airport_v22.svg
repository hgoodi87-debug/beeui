<svg width="100" height="135" viewBox="0 0 100 135" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <!-- Blue Pin Body -->
    <path d="M50 0C22.3858 0 0 22.3858 0 50C0 85 50 135 50 135C50 135 100 85 100 50C100 22.3858 77.6142 0 50 0Z" fill="#0000FF"/>

    <!-- White Circle Container -->
    <circle cx="50" cy="50" r="38" fill="white"/>

    <!-- "beeliber" text vertical on the tail -->
    <text transform="translate(54, 115) rotate(-90)" text-anchor="end" font-family="'Inter', sans-serif" font-weight="900" font-size="11" fill="white" letter-spacing="1">beeliber</text>

    <!-- Airport Building / Terminal Illustration -->
    <g transform="translate(25, 30) scale(1.1)">
        <rect x="5" y="15" width="40" height="15" rx="1" fill="#333333"/>
        <rect x="0" y="22" width="50" height="10" rx="1" fill="#333333"/>
        <!-- Windows -->
        <rect x="10" y="24" width="6" height="6" fill="#666666"/>
        <rect x="22" y="24" width="6" height="6" fill="#666666"/>
        <rect x="34" y="24" width="6" height="6" fill="#666666"/>

        <!-- Control Tower -->
        <rect x="38" y="0" width="8" height="20" fill="#333333"/>
        <rect x="36" y="0" width="12" height="6" rx="1" fill="#111111"/>

        <!-- Airplane Taking Off -->
        <g transform="translate(10, 5) rotate(-20)">
            <path d="M0 0 L25 -2 L28 0 L25 2 Z" fill="#333333" />
            <path d="M12 -2 L16 -12 L20 -2 Z" fill="#333333" />
            <path d="M12 2 L16 12 L20 2 Z" fill="#333333" />
        </g>
    </g>

    <!-- Drop Shadow -->
    <ellipse cx="50" cy="135" rx="15" ry="4" fill="black" fill-opacity="0.2"/>
</svg>
