<svg width="64" height="64" viewBox="0 0 64 64"
    xmlns="http://www.w3.org/2000/svg">
    <!-- 비리버 마스터피스 v13.0 ELITE CAPTAIN BEE (Dynamic Flight Version) -->

    <!-- Flight Glow Aura -->
    <circle cx="32" cy="32" r="30" fill="#FFCB05" fill-opacity="0.15"/>

    <!-- Aerodynamic Wings -->
    <ellipse cx="20" cy="22" rx="14" ry="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.5" transform="rotate(-20, 20, 22)"/>
    <ellipse cx="44" cy="22" rx="14" ry="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.5" transform="rotate(20, 44, 22)"/>

    <!-- High-Gloss Bee Body -->
    <rect x="14" y="26" width="36" height="26" rx="13" fill="#FFCB05" stroke="#1A1A1A" stroke-width="3"/>

    <!-- Elite Stripes -->
    <path d="M26 26 V52 M34 26 V52" stroke="#1A1A1A" stroke-width="5"/>

    <!-- Determination Gaze (Face) -->
    <circle cx="42" cy="36" r="3.5" fill="#1A1A1A"/>
    <path d="M42 44 C42 46 40 47 38 46" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Flying Suitcase Hook -->
    <path d="M14 44 H8 V52 H14" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="6" y="52" width="10" height="7" rx="1.5" fill="#1A1A1A"/>
</svg>
