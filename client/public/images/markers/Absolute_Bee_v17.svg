<svg width="80" height="90" viewBox="0 0 80 90"
    xmlns="http://www.w3.org/2000/svg">
    <!-- 비리버 마스터피스 v17.0 GOLD CARRIER BEE (Dynamic Transit Version) -->

    <!-- Motion Aura -->
    <ellipse cx="40" cy="82" rx="15" ry="4" fill="#FFCB05" fill-opacity="0.2"/>

    <!-- The Elite Bee (Pulling Carrier) -->
    <g transform="translate(15, 15)">
        <!-- Wings (Fluttering) -->
        <path d="M15 15 Q5 0 0 10 M15 15 Q5 25 0 15" stroke="#FFCB05" stroke-width="2" fill="none" opacity="0.6"/>

        <!-- Bee Body (Dynamic Lean) -->
        <rect x="15" y="10" width="30" height="22" rx="11" fill="#FFCB05" stroke="#BF9B30" stroke-width="2.5" transform="rotate(-15, 30, 21)"/>
        <path d="M25 12 V32 M35 12 V32" stroke="#1A1A1A" stroke-width="4" opacity="0.8"/>

        <!-- Eye & Smile -->
        <circle cx="40" cy="18" r="2.5" fill="#1A1A1A"/>

        <!-- Arms Pulling Carrier -->
        <path d="M18 25 L5 45" stroke="#BF9B30" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- The Traveling Carrier (Suitcase) -->
        <g transform="translate(-10, 45) rotate(10)">
            <rect x="0" y="0" width="25" height="18" rx="2" fill="#FFFFFF" stroke="#FFCB05" stroke-width="2.5"/>
            <rect x="8" y="-5" width="9" height="5" rx="1" fill="none" stroke="#FFCB05" stroke-width="2"/>
            <circle cx="5" cy="18" r="2.5" fill="#1A1A1A"/>
            <circle cx="20" cy="18" r="2.5" fill="#1A1A1A"/>
        </g>
    </g>

    <!-- Ground Connector (Directional Pointer) -->
    <path d="M40 85 L35 75 H45 L40 85Z" fill="#FFCB05"/>
</svg>
