<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Premium Outer Shadow/Glow -->
    <circle cx="30" cy="30" r="28" fill="white" fill-opacity="0.9" stroke="#FFCB05" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="24" fill="#FFCB05" fill-opacity="0.1"/>

    <!-- Traveler Icon (Stylized Backpacker) -->
    <g transform="translate(18, 15) scale(1.2)">
        <!-- Head -->
        <circle cx="10" cy="6" r="4" fill="#1A1A1A"/>
        <!-- Body -->
        <path d="M4 22V15C4 12.7909 5.79086 11 8 11H12C14.2091 11 16 12.7909 16 15V22" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Backpack -->
        <rect x="15" y="11" width="4" height="8" rx="1" fill="#1A1A1A"/>
        <!-- Walking Leg -->
        <path d="M8 22L6 28" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M12 22L14 28" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Pulsing Inner Core (Subtle) -->
    <circle cx="30" cy="30" r="4" fill="#FFCB05">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>
